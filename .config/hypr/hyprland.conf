source = ~/.config/hypr/mocha.conf

# ---------- Monitors ---------- #

monitor = HDMI-A-1, 1920x1080@60.00Hz, 0x0,    1
monitor = eDP-1,    preferred,         1920x0, 1

workspace = name:1, monitor:HDMI-A-1

# ---------- Programs ---------- #

$terminal = ghostty
$ipc      = dms ipc call

# ---------- Environment Variables ---------- #

env = HYPRCURSOR_THEME, rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,  24
env = XCURSOR_SIZE,     24

env = QT_AUTO_SCREEN_SCALE_FACTOR,         1
env = QT_QPA_PLATFORM,                     wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_QPA_PLATFORMTHEME,                qt6ct

env = TERMINAL, $terminal

# ---------- Look and Feel ---------- #

general {
  layout = scrolling
}
scrolling {
  column_width = 0.75
}

general {
  gaps_in     = 2
  gaps_out    = 4
  border_size = 0

  allow_tearing    = false
  resize_on_border = false
}

decoration {
  rounding       = 5
  rounding_power = 2

  active_opacity   = 0.95
  inactive_opacity = 0.95

  dim_inactive = true
  dim_special  = 0.5

  shadow:enabled = false

  blur:enabled  = true
  blur:xray     = true
}

animations {
  enabled = yes

  bezier = easeOutQuint,   0.23, 1,    0.32, 1
  bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
  bezier = linear,         0,    0,    1,    1
  bezier = almostLinear,   0.5,  0.5,  0.75, 1
  bezier = quick,          0.15, 0,    0.1,  1

  animation = global,        1, 10,   default
  animation = border,        1, 5.39, easeOutQuint
  animation = windows,       1, 4.79, easeOutQuint
  animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
  animation = windowsOut,    1, 1.49, linear,       popin 87%
  animation = fadeIn,        1, 1.73, almostLinear
  animation = fadeOut,       1, 1.46, almostLinear
  animation = fade,          1, 3.03, quick
  animation = layers,        1, 3.81, easeOutQuint
  animation = layersIn,      1, 4,    easeOutQuint, fade
  animation = layersOut,     1, 1.5,  linear,       fade
  animation = fadeLayersIn,  1, 1.79, almostLinear
  animation = fadeLayersOut, 1, 1.39, almostLinear
  animation = workspaces,    1, 1.94, almostLinear, fade
  animation = workspacesIn,  1, 1.21, almostLinear, fade
  animation = workspacesOut, 1, 1.94, almostLinear, fade
  animation = zoomFactor,    1, 7,    quick
}

master {
  new_status = master
}

# ---------- Input ---------- #

input {
  kb_layout  = us
  kb_variant =
  kb_model   =
  kb_options =
  kb_rules   =

  follow_mouse = 1
  sensitivity  = -0.75

  touchpad:natural_scroll = true
}

gesture = 3, horizontal, workspace

# ---------- Keybindings ---------- #

binds {
  window_direction_monitor_fallback = false
  allow_workspace_cycles = true
}

bind = ALT,       F4, killactive,
bind = ALT SHIFT, F4, exec, hyprshutdown

bind = SUPER, Escape, exec, $ipc lock lock
bind = SUPER, V,      exec, $ipc clipboard toggle
bind = ,      Print,  exec, hyprshot -m output

bind = SUPER, Return, exec, $terminal
bind = SUPER, R,      exec, $ipc launcher toggle
bind = SUPER, E,      exec, thunar

bind = SUPER, F, fullscreen, 1
bind = SUPER, S, layoutmsg, promote

bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

bind = SUPER SHIFT, H, layoutmsg, swapcol l
bind = SUPER SHIFT, L, layoutmsg, swapcol r

bind = SUPER, 1,   workspace, 1
bind = SUPER, 2,   workspace, 2
bind = SUPER, 3,   workspace, 3
bind = SUPER, 4,   workspace, 4
bind = SUPER, 5,   workspace, 5
bind = SUPER, 6,   workspace, 6
bind = SUPER, 7,   workspace, 7
bind = SUPER, 8,   workspace, 8
bind = SUPER, 9,   workspace, 9
bind = SUPER, 0,   workspace, 10
bind = SUPER, N,   workspace, emptym
bind = SUPER, Tab, workspace, previous

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER SHIFT, Tab, focusmonitor, +1

bind = SUPER,       O, togglespecialworkspace,
bind = SUPER SHIFT, O, movetoworkspace, special

bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl stop
bindl = , XF86AudioPrev,  exec, playerctl previous

# ---------- Workspaces & Windows ---------- #

windowrule {
  name = transparent-blacklist
  match:class = zen|feh|mpv
  # ---------- #
  opaque = true
}
windowrule {
  name = picture-picture
  match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
  # ---------- #
  float = true
  center = true
  size = 20%
  keep_aspect_ratio = true
  no_dim = true
}

windowrule {
  name = suppress-maximize-events
  match:class = .*
  # ---------- #
  suppress_event = maximize
}

windowrule {
  name = fix-xwayland-drags
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false
  # ---------- #
  no_focus = true
}

workspace = w[tv1], gapsout:0, gapsin:0
windowrule {
  name = no-gaps-when-only
  match:float = false
  match:workspace = w[tv1]
  # ---------- #
  border_size = 0
  rounding = 0
}
